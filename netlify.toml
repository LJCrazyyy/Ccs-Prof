  VITE_USE_FIRESTORE_EMULATOR = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets for 1 year (they have hash in filename)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache root index
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"